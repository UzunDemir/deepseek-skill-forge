---
name: design-bridge
version: 1

tests:
  - id: default
    prompt: "Perform your role as design-bridge. Context: Use when a task needs a DESIGN.md (e.g. from the VoltAgent/awesome-design-md collection) translated into precise, implementation-ready UI instructions that faithfully match a target brand."
    expected:
      return_contract: true
      checks:
        - "returns structured output matching SKILL.md Return section"
        - "validates at least one success path"
        - "validates at least one failure path"
        - "does not exceed scope boundaries"
    eval:
      method: llm-as-judge
      pass_threshold: 0.8
