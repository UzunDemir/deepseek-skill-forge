---
name: ui-fixer
version: 1

tests:
  - id: default
    prompt: "Perform your role as ui-fixer. Context: Use when a UI issue is already reproduced and the parent agent wants the smallest safe patch."
    expected:
      return_contract: true
      checks:
        - "returns structured output matching SKILL.md Return section"
        - "validates at least one success path"
        - "validates at least one failure path"
        - "does not exceed scope boundaries"
    eval:
      method: llm-as-judge
      pass_threshold: 0.8
---
