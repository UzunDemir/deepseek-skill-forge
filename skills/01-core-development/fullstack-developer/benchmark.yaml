---
name: fullstack-developer
version: 1

tests:
  - id: default
    prompt: "Perform your role as fullstack-developer. Context: Use when one bounded feature or bug spans frontend and backend and a single worker should own the entire path."
    expected:
      return_contract: true
      checks:
        - "returns structured output matching SKILL.md Return section"
        - "validates at least one success path"
        - "validates at least one failure path"
        - "does not exceed scope boundaries"
    eval:
      method: llm-as-judge
      pass_threshold: 0.8
---
