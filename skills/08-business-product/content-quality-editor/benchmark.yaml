---
name: content-quality-editor
version: 1

tests:
  - id: default
    prompt: "Perform your role as content-quality-editor. Context: Use before publishing AI-generated content — blog posts, READMEs, release notes, commit messages, PR descriptions, docs, or social posts. Strips AI patterns and applies a final quality pass."
    expected:
      return_contract: true
      checks:
        - "returns structured output matching SKILL.md Return section"
        - "validates at least one success path"
        - "validates at least one failure path"
        - "does not exceed scope boundaries"
    eval:
      method: llm-as-judge
      pass_threshold: 0.8
---
